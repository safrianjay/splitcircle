<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Live Session | SplitCircle</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap');
        
        body {
            font-family: 'Inter', sans-serif;
            background-color: #f8f9fa;
        }

        .neon-btn {
            background-color: #beff0a;
            color: #000;
            transition: all 0.3s ease;
        }

        .neon-btn:hover {
            background-color: #a8e600;
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(190, 255, 10, 0.2);
        }

        .no-scrollbar::-webkit-scrollbar {
            display: none;
        }

        #map {
            height: 50vh;
            width: 100%;
            border-radius: 0 0 32px 32px;
            z-index: 1;
        }

        .stats-card {
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.3);
        }

        @keyframes pulse-neon {
            0% { box-shadow: 0 0 0 0 rgba(190, 255, 10, 0.7); }
            70% { box-shadow: 0 0 0 10px rgba(190, 255, 10, 0); }
            100% { box-shadow: 0 0 0 0 rgba(190, 255, 10, 0); }
        }

        .pulse-indicator {
            animation: pulse-neon 2s infinite;
        }
    </style>
</head>
<body class="flex flex-col min-h-screen">

    <div class="fixed top-0 w-full z-50 bg-white/80 backdrop-blur-xl border-b border-neutral-200">
        <header class="max-w-3xl mx-auto px-4 py-4 flex justify-between items-center">
            <div class="flex items-center gap-3">
                <div class="w-2.5 h-2.5 rounded-full bg-[#beff0a] pulse-indicator"></div>
                <h1 class="text-lg font-black text-neutral-950 tracking-tight">LIVE SESSION</h1>
            </div>
            <button class="w-10 h-10 flex items-center justify-center rounded-full hover:bg-neutral-100 transition-colors">
                <svg width="20" height="20" fill="currentColor" class="text-neutral-500" viewBox="0 0 16 16">
                    <path d="M9.5 13a1.5 1.5 0 1 1-3 0 1.5 1.5 0 0 1 3 0zm0-5a1.5 1.5 0 1 1-3 0 1.5 1.5 0 0 1 3 0zm0-5a1.5 1.5 0 1 1-3 0 1.5 1.5 0 0 1 3 0z"/>
                </svg>
            </button>
        </header>
    </div>

    <main class="flex-1 pb-48 w-full space-y-6">
        
        <!-- Live Map Prototype (Half Screen) -->
        <div class="relative w-full">
            <div id="map" class="shadow-inner border-b border-neutral-200"></div>
            <div class="absolute bottom-6 right-6 z-[2]">
                <div class="bg-white/90 backdrop-blur-md p-2 rounded-xl border border-neutral-200 shadow-lg">
                     <svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24" class="text-neutral-950"><path d="M15 3h6v6"></path><path d="M9 21H3v-6"></path><path d="M21 3l-7 7"></path><path d="M3 21l7-7"></path></svg>
                </div>
            </div>
        </div>

        <div class="px-4 max-w-3xl mx-auto w-full space-y-6">

        <!-- Main Stats Grid (3 Columns) -->
        <div class="grid grid-cols-3 gap-3">
            <div class="bg-neutral-950 p-4 rounded-3xl border border-neutral-800 shadow-sm relative overflow-hidden flex flex-col items-center justify-center text-center">
                <p class="text-[8px] font-bold text-neutral-500 uppercase tracking-widest mb-1">Heart Rate</p>
                <div class="flex items-baseline gap-1">
                    <h2 class="text-xl font-black text-white">142</h2>
                    <span class="text-[8px] font-bold text-neutral-500 uppercase">bpm</span>
                </div>
            </div>

            <div class="bg-white p-4 rounded-3xl border border-neutral-200 shadow-sm relative overflow-hidden flex flex-col items-center justify-center text-center">
                <p class="text-[8px] font-bold text-neutral-400 uppercase tracking-widest mb-1">Duration</p>
                <h2 id="timer-display" class="text-xl font-black text-neutral-950 tracking-tight">14:22</h2>
            </div>
            
            <div class="bg-white p-4 rounded-3xl border border-neutral-200 shadow-sm relative overflow-hidden flex flex-col items-center justify-center text-center">
                <p class="text-[8px] font-bold text-neutral-400 uppercase tracking-widest mb-1">Avg Pace</p>
                <div class="flex items-baseline gap-0.5">
                    <h2 class="text-xl font-black text-neutral-950 tracking-tight">4'22"</h2>
                    <span class="text-[8px] font-bold text-neutral-400 uppercase">/km</span>
                </div>
            </div>
        </div>

        <!-- Intensity Zone (Restored) -->
        <div class="bg-white p-6 rounded-[2rem] border border-neutral-200 shadow-sm relative overflow-hidden">
            <div class="flex justify-between items-center mb-4">
                <h3 class="text-sm font-black text-neutral-950">Intensity Zone</h3>
                <span class="text-[10px] font-bold text-[#beff0a] bg-neutral-950 px-2 py-0.5 rounded-full">ANAEROBIC</span>
            </div>
            <div class="flex items-end gap-1.5 h-16 w-full">
                <div class="flex-1 bg-neutral-100 h-[20%] rounded-t-md"></div>
                <div class="flex-1 bg-neutral-100 h-[40%] rounded-t-md"></div>
                <div class="flex-1 bg-neutral-100 h-[30%] rounded-t-md"></div>
                <div class="flex-1 bg-[#beff0a] h-[80%] rounded-t-md"></div>
                <div class="flex-1 bg-[#beff0a] h-[90%] rounded-t-md"></div>
                <div class="flex-1 bg-neutral-100 h-[60%] rounded-t-md"></div>
                <div class="flex-1 bg-neutral-100 h-[45%] rounded-t-md"></div>
                <div class="flex-1 bg-neutral-100 h-[30%] rounded-t-md"></div>
                <div class="flex-1 bg-[#beff0a] h-[70%] rounded-t-md shadow-[0_0_15px_rgba(190,255,10,0.3)]"></div>
                <div class="flex-1 bg-[#beff0a] h-[85%] rounded-t-md"></div>
                <div class="flex-1 bg-neutral-100 h-[50%] rounded-t-md"></div>
                <div class="flex-1 bg-neutral-100 h-[40%] rounded-t-md"></div>
            </div>
        </div>

        </div> <!-- Close px-4 max-w-3xl -->
    </main>
    <div class="fixed bottom-0 left-0 w-full z-50 flex flex-col">
        <div class="bg-white/80 backdrop-blur-xl border-t border-neutral-200 px-6 py-4 flex items-center justify-between">
            <div>
                <p class="text-[10px] font-bold text-neutral-400 uppercase tracking-widest mb-0.5">Distance</p>
                <p class="text-xl font-extrabold text-neutral-950 leading-none">2.42 <span class="text-xs font-bold text-neutral-400">km</span></p>
            </div>
            <button id="session-action" class="px-8 py-4 rounded-2xl neon-btn font-black text-sm shadow-lg hover:scale-105 transition-all active:scale-95">
                Stop Session
            </button>
        </div>
        <!-- Bottom Navigation -->
        <nav class="md:hidden relative w-full bg-white/90 backdrop-blur-xl border-t border-neutral-100 flex justify-around items-center py-4 z-40" style="padding-bottom: calc(env(safe-area-inset-bottom) + 16px);">

        <a href="index.html" class="flex flex-col items-center gap-1 text-neutral-400 hover:text-neutral-950 transition-colors">
            <svg width="26" height="26" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path><polyline points="9 22 9 12 15 12 15 22"></polyline></svg>
        </a>
        <a href="sport.html" class="flex flex-col items-center gap-1 text-neutral-400 hover:text-neutral-950 transition-colors">
            <svg width="26" height="26" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"></path><circle cx="9" cy="7" r="4"></circle><path d="M23 21v-2a4 4 0 0 0-3-3.87"></path><path d="M16 3.13a4 4 0 0 1 0 7.75"></path></svg>
        </a>
        <a href="split.html" class="flex flex-col items-center gap-1 text-neutral-400 hover:text-neutral-950 transition-colors">
            <svg width="26" height="26" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><line x1="12" y1="1" x2="12" y2="23"></line><path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"></path></svg>
        </a>
        <a href="#" class="flex flex-col items-center gap-1 text-[#beff0a]">
            <div class="relative">
                <svg width="26" height="26" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path d="M22 12h-4l-3 9L9 3l-3 9H2"/></svg>
                <div class="absolute -bottom-3 left-1/2 -translate-x-1/2 w-1.5 h-1.5 bg-[#beff0a] rounded-full"></div>
            </div>
        </a>
        <a href="#" class="flex flex-col items-center gap-1 text-neutral-400 hover:text-neutral-950 transition-colors">
            <div class="w-7 h-7 rounded-full bg-neutral-200 border-2 border-white shadow-sm overflow-hidden flex items-center justify-center">
                 <span class="font-bold text-neutral-500 text-[10px]">S</span>
            </div>
        </a>
        <div class="absolute top-full left-0 w-full h-[100px] bg-white"></div>
    </nav>
    </div>

    <script>
        // Leaflet Map Initialization with stylized dark tiles
        const map = L.map('map', {
            zoomControl: false,
            attributionControl: false
        }).setView([3.1390, 101.6869], 16); // Kuala Lumpur coordinates

        L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png', {
            maxZoom: 19
        }).addTo(map);

        // Dummy Track Line
        const latlngs = [
            [3.1390, 101.6869],
            [3.1395, 101.6875],
            [3.1400, 101.6870],
            [3.1405, 101.6880]
        ];
        
        const polyline = L.polyline(latlngs, {
            color: '#beff0a',
            weight: 5,
            opacity: 0.8,
            lineJoin: 'round'
        }).addTo(map);

        // Current Position Marker
        const marker = L.circleMarker([3.1405, 101.6880], {
            radius: 8,
            fillColor: '#beff0a',
            color: '#fff',
            weight: 3,
            opacity: 1,
            fillOpacity: 1
        }).addTo(map);

        map.fitBounds(polyline.getBounds(), { padding: [30, 30] });

        // Simple Timer Logic
        let seconds = 862; // Starting at 14:22
        setInterval(() => {
            seconds++;
            const hrs = Math.floor(seconds / 3600);
            const mins = String(Math.floor((seconds % 3600) / 60)).padStart(2, '0');
            const secs = String(seconds % 60).padStart(2, '0');
            
            const timeStr = hrs > 0 ? `${hrs}:${mins}:${secs}` : `${mins}:${secs}`;
            document.getElementById('timer-display').innerText = timeStr;
        }, 1000);

        // Session Action Toggle Logic
        const actionBtn = document.getElementById('session-action');
        let sessionState = 'running'; // running, paused

        actionBtn.addEventListener('click', () => {
            if (sessionState === 'running') {
                actionBtn.innerText = 'Resume Session';
                actionBtn.classList.remove('neon-btn');
                actionBtn.classList.add('bg-neutral-950', 'text-white');
                sessionState = 'paused';
            } else {
                actionBtn.innerText = 'Stop Session';
                actionBtn.classList.add('neon-btn');
                actionBtn.classList.remove('bg-neutral-950', 'text-white');
                sessionState = 'running';
            }
        });
    </script>
</body>
</html>
